name: Uptime Monitor

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  check-uptime:
    name: Check Services
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check Abdelrahman Portfolio
        id: abdelrahman
        continue-on-error: true
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 --location https://www.abdelrahman-ezzat.com) || STATUS=0
          TIME=$(curl -s -o /dev/null -w "%{time_total}" --max-time 15 --location https://www.abdelrahman-ezzat.com) || TIME=0
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "time=$TIME" >> $GITHUB_OUTPUT
          echo "Portfolio: HTTP $STATUS in ${TIME}s"
          [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ] && echo "result=up" >> $GITHUB_OUTPUT || echo "result=down" >> $GITHUB_OUTPUT

      - name: Check QuNeva Website
        id: website
        continue-on-error: true
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 --location https://www.quneva.com) || STATUS=0
          TIME=$(curl -s -o /dev/null -w "%{time_total}" --max-time 15 --location https://www.quneva.com) || TIME=0
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "time=$TIME" >> $GITHUB_OUTPUT
          echo "Website: HTTP $STATUS in ${TIME}s"
          [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ] && echo "result=up" >> $GITHUB_OUTPUT || echo "result=down" >> $GITHUB_OUTPUT

      - name: Check QuNeva HA
        id: ha
        continue-on-error: true
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 --location https://ha.quneva.com) || STATUS=0
          TIME=$(curl -s -o /dev/null -w "%{time_total}" --max-time 15 --location https://ha.quneva.com) || TIME=0
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "time=$TIME" >> $GITHUB_OUTPUT
          echo "HA: HTTP $STATUS in ${TIME}s"
          [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ] && echo "result=up" >> $GITHUB_OUTPUT || echo "result=down" >> $GITHUB_OUTPUT

      - name: Check QuNeva AI
        id: ai
        continue-on-error: true
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 --location https://ai.quneva.com) || STATUS=0
          TIME=$(curl -s -o /dev/null -w "%{time_total}" --max-time 15 --location https://ai.quneva.com) || TIME=0
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "time=$TIME" >> $GITHUB_OUTPUT
          echo "AI: HTTP $STATUS in ${TIME}s"
          [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ] && echo "result=up" >> $GITHUB_OUTPUT || echo "result=down" >> $GITHUB_OUTPUT

      - name: Check QuNeva Root Domain
        id: root
        continue-on-error: true
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 --location https://quneva.com) || STATUS=0
          TIME=$(curl -s -o /dev/null -w "%{time_total}" --max-time 15 --location https://quneva.com) || TIME=0
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "time=$TIME" >> $GITHUB_OUTPUT
          echo "Root domain: HTTP $STATUS in ${TIME}s"
          [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ] && echo "result=up" >> $GITHUB_OUTPUT || echo "result=down" >> $GITHUB_OUTPUT

      - name: Update status JSON
        run: |
          mkdir -p data
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          DATE=$(date -u +"%Y-%m-%d")

          cat > data/status.json << JSONEOF
          {
            "timestamp": "$TIMESTAMP",
            "date": "$DATE",
            "services": {
              "abdelrahman": {
                "name": "Abdelrahman Portfolio",
                "url": "https://www.abdelrahman-ezzat.com",
                "status": "${{ steps.abdelrahman.outputs.result }}",
                "http_status": ${{ steps.abdelrahman.outputs.status || 0 }},
                "response_time_s": ${{ steps.abdelrahman.outputs.time || 0 }}
              },
              "website": {
                "name": "QuNeva Website",
                "url": "https://www.quneva.com",
                "status": "${{ steps.website.outputs.result }}",
                "http_status": ${{ steps.website.outputs.status || 0 }},
                "response_time_s": ${{ steps.website.outputs.time || 0 }}
              },
              "ha": {
                "name": "QuNeva HA",
                "url": "https://ha.quneva.com",
                "status": "${{ steps.ha.outputs.result }}",
                "http_status": ${{ steps.ha.outputs.status || 0 }},
                "response_time_s": ${{ steps.ha.outputs.time || 0 }}
              },
              "ai": {
                "name": "QuNeva AI",
                "url": "https://ai.quneva.com",
                "status": "${{ steps.ai.outputs.result }}",
                "http_status": ${{ steps.ai.outputs.status || 0 }},
                "response_time_s": ${{ steps.ai.outputs.time || 0 }}
              },
              "root": {
                "name": "QuNeva Root Domain",
                "url": "https://quneva.com",
                "status": "${{ steps.root.outputs.result }}",
                "http_status": ${{ steps.root.outputs.status || 0 }},
                "response_time_s": ${{ steps.root.outputs.time || 0 }}
              }
            }
          }
          JSONEOF

          echo "Status file written:"
          cat data/status.json

      - name: Append to history CSV
        run: |
          mkdir -p data
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          if [ ! -f data/history.csv ]; then
            echo "timestamp,abdelrahman_result,abdelrahman_http,abdelrahman_time,website_result,website_http,website_time,ha_result,ha_http,ha_time,ai_result,ai_http,ai_time,root_result,root_http,root_time" > data/history.csv
          fi
          echo "$TIMESTAMP,${{ steps.abdelrahman.outputs.result || 'down' }},${{ steps.abdelrahman.outputs.status || 0 }},${{ steps.abdelrahman.outputs.time || 0 }},${{ steps.website.outputs.result || 'down' }},${{ steps.website.outputs.status || 0 }},${{ steps.website.outputs.time || 0 }},${{ steps.ha.outputs.result || 'down' }},${{ steps.ha.outputs.status || 0 }},${{ steps.ha.outputs.time || 0 }},${{ steps.ai.outputs.result || 'down' }},${{ steps.ai.outputs.status || 0 }},${{ steps.ai.outputs.time || 0 }},${{ steps.root.outputs.result || 'down' }},${{ steps.root.outputs.status || 0 }},${{ steps.root.outputs.time || 0 }}" >> data/history.csv

      - name: Open incident if down
        id: open_incident
        if: |
          steps.abdelrahman.outputs.result == 'down' ||
          steps.website.outputs.result == 'down' ||
          steps.ha.outputs.result == 'down' ||
          steps.ai.outputs.result == 'down' ||
          steps.root.outputs.result == 'down'
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const checks = {
              'Abdelrahman Portfolio': { result: '${{ steps.abdelrahman.outputs.result }}', http: '${{ steps.abdelrahman.outputs.status }}' },
              'QuNeva Website':        { result: '${{ steps.website.outputs.result }}',     http: '${{ steps.website.outputs.status }}' },
              'QuNeva HA':             { result: '${{ steps.ha.outputs.result }}',           http: '${{ steps.ha.outputs.status }}' },
              'QuNeva AI':             { result: '${{ steps.ai.outputs.result }}',           http: '${{ steps.ai.outputs.status }}' },
              'QuNeva Root Domain':    { result: '${{ steps.root.outputs.result }}',         http: '${{ steps.root.outputs.status }}' },
            };
            const down = Object.entries(checks)
              .filter(([, v]) => v.result === 'down')
              .map(([name, v]) => `${name} (HTTP ${v.http || 0})`);

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'incident'
            });
            const alreadyOpen = existing.data.some(i => i.title.startsWith('[Incident]'));
            if (!alreadyOpen) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `[Incident] Service disruption: ${down.join(', ')}`,
                labels: ['incident'],
                body: `## 🔴 Service Disruption Detected\n\n**Time:** ${new Date().toISOString()}\n\n**Affected services:**\n${down.map(d => `- ${d}`).join('\n')}\n\nThis issue was automatically created by the uptime monitor.\nIt will be **automatically closed** when all affected services recover.`
              });
            }

      - name: Auto-close incident if all services recovered
        if: |
          steps.abdelrahman.outputs.result == 'up' &&
          steps.website.outputs.result == 'up' &&
          steps.ha.outputs.result == 'up' &&
          steps.ai.outputs.result == 'up' &&
          steps.root.outputs.result == 'up'
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'incident'
            });
            for (const issue of existing.data.filter(i => i.title.startsWith('[Incident]'))) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `## ✅ All Systems Recovered\n\n**Time:** ${new Date().toISOString()}\n\nAll monitored services are back online. Closing this incident automatically.`
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed'
              });
            }

      - name: Commit status data
        run: |
          git config user.name "QuNeva Status Bot"
          git config user.email "status-bot@quneva.com"
          git add data/
          git diff --staged --quiet || git commit -m "chore: uptime check $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push

      - name: Summary
        run: |
          echo "## ⏱ Uptime Check Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Status | HTTP | Response |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|------|----------|" >> $GITHUB_STEP_SUMMARY
          echo "| Abdelrahman Portfolio | ${{ steps.abdelrahman.outputs.result }} | ${{ steps.abdelrahman.outputs.status }} | ${{ steps.abdelrahman.outputs.time }}s |" >> $GITHUB_STEP_SUMMARY
          echo "| QuNeva Website | ${{ steps.website.outputs.result }} | ${{ steps.website.outputs.status }} | ${{ steps.website.outputs.time }}s |" >> $GITHUB_STEP_SUMMARY
          echo "| QuNeva HA | ${{ steps.ha.outputs.result }} | ${{ steps.ha.outputs.status }} | ${{ steps.ha.outputs.time }}s |" >> $GITHUB_STEP_SUMMARY
          echo "| QuNeva AI | ${{ steps.ai.outputs.result }} | ${{ steps.ai.outputs.status }} | ${{ steps.ai.outputs.time }}s |" >> $GITHUB_STEP_SUMMARY
          echo "| Root Domain | ${{ steps.root.outputs.result }} | ${{ steps.root.outputs.status }} | ${{ steps.root.outputs.time }}s |" >> $GITHUB_STEP_SUMMARY
