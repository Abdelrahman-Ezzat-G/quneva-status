name: Uptime Monitor

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: uptime-monitor
  # Don't cancel an in-flight monitor run — every scheduled check should complete.
  cancel-in-progress: false

jobs:
  check-uptime:
    name: Check Services
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Check QuNeva Website
        id: website
        continue-on-error: true
        run: |
          OUT=$(curl -s -o /dev/null -w "%{http_code} %{time_total}" --max-time 15 --retry 2 --retry-delay 2 --location https://www.quneva.com) || OUT="0 0"
          STATUS="${OUT%% *}"; TIME="${OUT##* }"
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "time=$TIME" >> $GITHUB_OUTPUT
          echo "Website: HTTP $STATUS in ${TIME}s"
          [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ] && echo "result=up" >> $GITHUB_OUTPUT || echo "result=down" >> $GITHUB_OUTPUT

      - name: Check QuNeva AI
        id: ai
        continue-on-error: true
        run: |
          OUT=$(curl -s -o /dev/null -w "%{http_code} %{time_total}" --max-time 15 --retry 2 --retry-delay 2 --location https://ai.quneva.com) || OUT="0 0"
          STATUS="${OUT%% *}"; TIME="${OUT##* }"
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "time=$TIME" >> $GITHUB_OUTPUT
          echo "AI: HTTP $STATUS in ${TIME}s"
          [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ] && echo "result=up" >> $GITHUB_OUTPUT || echo "result=down" >> $GITHUB_OUTPUT

      - name: Check QuNeva Root Domain
        id: root
        continue-on-error: true
        run: |
          # Probe the dedicated /healthz endpoint (exempt from Cloudflare bot
          # protection) rather than the homepage, which may serve decoy content.
          OUT=$(curl -s -o /dev/null -w "%{http_code} %{time_total}" --max-time 15 --retry 2 --retry-delay 2 --location https://quneva.com/healthz) || OUT="0 0"
          STATUS="${OUT%% *}"; TIME="${OUT##* }"
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "time=$TIME" >> $GITHUB_OUTPUT
          echo "Root domain: HTTP $STATUS in ${TIME}s"
          [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ] && echo "result=up" >> $GITHUB_OUTPUT || echo "result=down" >> $GITHUB_OUTPUT

      - name: Update status JSON
        run: |
          mkdir -p data
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          DATE=$(date -u +"%Y-%m-%d")

          cat > data/status.json << JSONEOF
          {
            "timestamp": "$TIMESTAMP",
            "date": "$DATE",
            "services": {
              "website": {
                "name": "QuNeva Website",
                "url": "https://www.quneva.com",
                "status": "${{ steps.website.outputs.result }}",
                "http_status": ${{ steps.website.outputs.status || 0 }},
                "response_time_s": ${{ steps.website.outputs.time || 0 }}
              },
              "ai": {
                "name": "QuNeva AI",
                "url": "https://ai.quneva.com",
                "status": "${{ steps.ai.outputs.result }}",
                "http_status": ${{ steps.ai.outputs.status || 0 }},
                "response_time_s": ${{ steps.ai.outputs.time || 0 }}
              },
              "root": {
                "name": "QuNeva Root Domain",
                "url": "https://quneva.com",
                "status": "${{ steps.root.outputs.result }}",
                "http_status": ${{ steps.root.outputs.status || 0 }},
                "response_time_s": ${{ steps.root.outputs.time || 0 }}
              }
            }
          }
          JSONEOF

      - name: Append to history CSV
        run: |
          mkdir -p data
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          MONTH=$(date -u +"%Y-%m")
          HEADER="timestamp,website_result,website_http,website_time,ai_result,ai_http,ai_time,root_result,root_http,root_time"
          ROW="$TIMESTAMP,${{ steps.website.outputs.result || 'down' }},${{ steps.website.outputs.status || 0 }},${{ steps.website.outputs.time || 0 }},${{ steps.ai.outputs.result || 'down' }},${{ steps.ai.outputs.status || 0 }},${{ steps.ai.outputs.time || 0 }},${{ steps.root.outputs.result || 'down' }},${{ steps.root.outputs.status || 0 }},${{ steps.root.outputs.time || 0 }}"

          # Live file used by the dashboard (kept to the most recent 500 rows)
          if [ ! -f data/history.csv ]; then
            echo "$HEADER" > data/history.csv
          fi
          echo "$ROW" >> data/history.csv
          tail -n 500 data/history.csv > data/history.tmp
          mv data/history.tmp data/history.csv

          # Permanent monthly archive (append-only, never truncated)
          ARCHIVE="data/history-archive-$MONTH.csv"
          if [ ! -f "$ARCHIVE" ]; then
            echo "$HEADER" > "$ARCHIVE"
          fi
          echo "$ROW" >> "$ARCHIVE"

      - name: Build archive manifest
        run: |
          # List available monthly archives so the dashboard fetches exactly
          # what exists (no guessing, no 404s).
          ls data/history-archive-*.csv 2>/dev/null \
            | sed -E 's|.*history-archive-(.+)\.csv|\1|' \
            | sort \
            | python3 -c "import sys, json; print(json.dumps([l.strip() for l in sys.stdin if l.strip()]))" \
            > data/archives.json
          cat data/archives.json

      - name: Open incident if down
        id: incident
        if: |
          steps.website.outputs.result == 'down' ||
          steps.ai.outputs.result == 'down' ||
          steps.root.outputs.result == 'down'
        uses: actions/github-script@v8
        env:
          WEBSITE_RESULT: ${{ steps.website.outputs.result }}
          WEBSITE_HTTP: ${{ steps.website.outputs.status }}
          AI_RESULT: ${{ steps.ai.outputs.result }}
          AI_HTTP: ${{ steps.ai.outputs.status }}
          ROOT_RESULT: ${{ steps.root.outputs.result }}
          ROOT_HTTP: ${{ steps.root.outputs.status }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const checks = {
              'QuNeva Website': { result: process.env.WEBSITE_RESULT, http: process.env.WEBSITE_HTTP },
              'QuNeva AI': { result: process.env.AI_RESULT, http: process.env.AI_HTTP },
              'QuNeva Root Domain': { result: process.env.ROOT_RESULT, http: process.env.ROOT_HTTP },
            };

            const down = Object.entries(checks)
              .filter(([, v]) => v.result === 'down')
              .map(([name, v]) => `${name} (HTTP ${v.http || 0})`);

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'incident'
            });

            const alreadyOpen = existing.data.some(i => i.title.startsWith('[Incident]'));

            if (!alreadyOpen) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `[Incident] Service disruption: ${down.join(', ')}`,
                labels: ['incident'],
                body: `## 🔴 Service Disruption Detected\n\n**Time:** ${new Date().toISOString()}\n\n**Affected services:**\n${down.map(d => `- ${d}`).join('\n')}\n\nThis issue was automatically created by the uptime monitor.`
              });
              // Signal the email step that this is a NEW incident (avoids hourly re-alerts).
              core.setOutput('created', 'true');
              core.setOutput('down', down.join(', '));
            }

      - name: Auto-close incident if all services recovered
        id: recover
        if: |
          steps.website.outputs.result == 'up' &&
          steps.ai.outputs.result == 'up' &&
          steps.root.outputs.result == 'up'
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'incident'
            });

            const open = existing.data.filter(i => i.title.startsWith('[Incident]'));
            for (const issue of open) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `## ✅ All Systems Recovered\n\n**Time:** ${new Date().toISOString()}\n\nAll monitored services are back online. Closing this incident automatically.`
              });

              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed'
              });
            }
            // Only signal recovery if we actually closed something (state changed).
            if (open.length > 0) core.setOutput('recovered', 'true');

      - name: Email alert on state change
        if: always()
        continue-on-error: true
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          MAIL_FROM: ${{ secrets.MAIL_FROM || 'QuNeva Status <status@abdelrahman-ezzat.com>' }}
          MAIL_TO: ${{ secrets.MAIL_TO || 'abdelrahman-ezzat@outlook.com' }}
          SMTP_HOST: ${{ secrets.SMTP_HOST || 'smtp-mail.outlook.com' }}
          SMTP_PORT: ${{ secrets.SMTP_PORT || '587' }}
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          NEW_INCIDENT: ${{ steps.incident.outputs.created }}
          DOWN_LIST: ${{ steps.incident.outputs.down }}
          RECOVERED: ${{ steps.recover.outputs.recovered }}
        run: |
          NOW=$(date -u +'%Y-%m-%d %H:%M UTC')
          if [ "$NEW_INCIDENT" = "true" ]; then
            export SUBJECT="[QuNeva Status] 🔴 Service disruption: $DOWN_LIST"
            export TEXT="A service disruption was detected.

          Affected: $DOWN_LIST
          Time: $NOW

          Live status: https://status.quneva.com"
          elif [ "$RECOVERED" = "true" ]; then
            export SUBJECT="[QuNeva Status] ✅ All systems recovered"
            export TEXT="All monitored services are back online.

          Time: $NOW

          Live status: https://status.quneva.com"
          else
            echo "No state change this run — no email."
            exit 0
          fi

          # Preferred: Resend HTTP API (reliable transactional email)
          if [ -n "$RESEND_API_KEY" ]; then
            PAYLOAD=$(python3 -c 'import os,json; print(json.dumps({"from":os.environ["MAIL_FROM"],"to":[os.environ["MAIL_TO"]],"subject":os.environ["SUBJECT"],"text":os.environ["TEXT"]}))')
            HTTP=$(curl -s -o /tmp/resend.json -w '%{http_code}' -X POST https://api.resend.com/emails \
              -H "Authorization: Bearer $RESEND_API_KEY" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD")
            echo "Resend responded HTTP $HTTP"
            cat /tmp/resend.json 2>/dev/null || true
            case "$HTTP" in
              200|201) echo "Alert email sent to $MAIL_TO via Resend"; exit 0 ;;
              *) echo "Resend send failed (HTTP $HTTP)" ;;
            esac
          fi

          # Fallback: SMTP via curl, if configured
          if [ -n "$MAIL_USERNAME" ] && [ -n "$MAIL_PASSWORD" ]; then
            {
              printf 'From: %s\r\n' "$MAIL_FROM"
              printf 'To: %s\r\n' "$MAIL_TO"
              printf 'Subject: %s\r\n' "$SUBJECT"
              printf 'MIME-Version: 1.0\r\n'
              printf 'Content-Type: text/plain; charset=UTF-8\r\n'
              printf '\r\n%s\r\n' "$TEXT"
            } > /tmp/mail.txt
            if curl --silent --show-error --ssl-reqd \
                 --url "smtp://$SMTP_HOST:$SMTP_PORT" \
                 --user "$MAIL_USERNAME:$MAIL_PASSWORD" \
                 --mail-from "$MAIL_USERNAME" --mail-rcpt "$MAIL_TO" \
                 --upload-file /tmp/mail.txt; then
              echo "Alert email sent to $MAIL_TO via SMTP"; exit 0
            fi
            echo "SMTP send failed"
          fi

          echo "No working email provider — set RESEND_API_KEY (recommended) or MAIL_USERNAME+MAIL_PASSWORD."

      - name: Build incidents JSON
        continue-on-error: true
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const cutoff = Date.now() - 30 * 86400000;

            const [open, closed] = await Promise.all([
              github.rest.issues.listForRepo({
                owner: context.repo.owner, repo: context.repo.repo,
                state: 'open', labels: 'incident', per_page: 20
              }),
              github.rest.issues.listForRepo({
                owner: context.repo.owner, repo: context.repo.repo,
                state: 'closed', labels: 'incident', per_page: 30,
                sort: 'updated', direction: 'desc'
              })
            ]);

            const all = [...open.data, ...closed.data]
              .filter(i => !i.pull_request)
              .filter(i => new Date(i.created_at).getTime() >= cutoff)
              .sort((a, b) => new Date(b.created_at) - new Date(a.created_at))
              .map(i => ({
                title: i.title,
                html_url: i.html_url,
                state: i.state,
                created_at: i.created_at,
                closed_at: i.closed_at
              }));

            fs.mkdirSync('data', { recursive: true });
            fs.writeFileSync('data/incidents.json', JSON.stringify(all, null, 2) + '\n');
            console.log(`Wrote ${all.length} incidents to data/incidents.json`);

            // Atom feed so users can subscribe to incident updates.
            // Built line-by-line (not a multiline template) to keep the XML free
            // of the YAML block indentation.
            const esc = s => String(s ?? '').replace(/[&<>"']/g, c => (
              { '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&apos;' }[c]));
            const site = 'https://status.quneva.com';
            const updated = (all[0] && (all[0].closed_at || all[0].created_at)) || new Date().toISOString();
            const L = [];
            L.push('<?xml version="1.0" encoding="utf-8"?>');
            L.push('<feed xmlns="http://www.w3.org/2005/Atom">');
            L.push('  <title>QuNeva Status — Incidents</title>');
            L.push('  <link href="' + site + '/data/incidents.xml" rel="self"/>');
            L.push('  <link href="' + site + '"/>');
            L.push('  <id>' + site + '/</id>');
            L.push('  <updated>' + new Date(updated).toISOString() + '</updated>');
            for (const i of all) {
              L.push('  <entry>');
              L.push('    <title>' + esc(i.title) + '</title>');
              L.push('    <link href="' + esc(i.html_url) + '"/>');
              L.push('    <id>' + esc(i.html_url) + '</id>');
              L.push('    <updated>' + new Date(i.closed_at || i.created_at).toISOString() + '</updated>');
              L.push('    <published>' + new Date(i.created_at).toISOString() + '</published>');
              L.push('    <summary>' + (i.state === 'open' ? 'Ongoing incident' : 'Resolved incident') + '</summary>');
              L.push('  </entry>');
            }
            L.push('</feed>');
            fs.writeFileSync('data/incidents.xml', L.join('\n') + '\n');
            console.log(`Wrote Atom feed with ${all.length} entries to data/incidents.xml`);

      - name: Build maintenance JSON
        continue-on-error: true
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            // Open issues labelled 'maintenance' are shown as maintenance notices.
            const res = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'open', labels: 'maintenance', per_page: 20,
              sort: 'created', direction: 'desc'
            });
            const items = res.data
              .filter(i => !i.pull_request)
              .map(i => ({
                title: i.title.replace(/^\[Maintenance\]\s*/i, ''),
                html_url: i.html_url,
                created_at: i.created_at,
                body: (i.body || '').slice(0, 400)
              }));
            fs.mkdirSync('data', { recursive: true });
            fs.writeFileSync('data/maintenance.json', JSON.stringify(items, null, 2) + '\n');
            console.log(`Wrote ${items.length} maintenance notices to data/maintenance.json`);

      - name: Commit status data
        run: |
          git config user.name "QuNeva Status Bot"
          git config user.email "status-bot@quneva.com"

          git add data/

          if git diff --staged --quiet; then
            echo "No status changes to commit"
            exit 0
          fi

          git commit -m "chore: uptime check $(date -u +'%Y-%m-%d %H:%M UTC')"

          for i in 1 2 3; do
            git fetch origin main
            git rebase origin/main || git rebase --abort
            if git push --force-with-lease origin HEAD:main; then
              echo "Status data pushed successfully"
              exit 0
            fi
            echo "Push failed, retrying in 10 seconds..."
            sleep 10
          done

          echo "Failed to push status data after retries"
          exit 1

      - name: Summary
        if: always()
        run: |
          echo "## ⏱ Uptime Check Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Status | HTTP | Response |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|------|----------|" >> $GITHUB_STEP_SUMMARY
          echo "| QuNeva Website | ${{ steps.website.outputs.result }} | ${{ steps.website.outputs.status }} | ${{ steps.website.outputs.time }}s |" >> $GITHUB_STEP_SUMMARY
          echo "| QuNeva AI | ${{ steps.ai.outputs.result }} | ${{ steps.ai.outputs.status }} | ${{ steps.ai.outputs.time }}s |" >> $GITHUB_STEP_SUMMARY
          echo "| Root Domain | ${{ steps.root.outputs.result }} | ${{ steps.root.outputs.status }} | ${{ steps.root.outputs.time }}s |" >> $GITHUB_STEP_SUMMARY
