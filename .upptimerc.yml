owner: Abdelrahman-Ezzat-G
repo: quneva-status

sites:
  - name: QuNeva Website
    url: https://www.quneva.com
  - name: QuNeva Root Domain
    url: https://quneva.com
  - name: QuNeva Login
    url: https://www.quneva.com/login

status-website:
  cname: status.quneva.com
  name: QuNeva Status
  introTitle: "🟢 QuNeva System Status"
  introMessage: "Real-time uptime and availability monitoring for QuNeva Workforce Management Platform."
  logoUrl: https://www.quneva.com/favicon.ico
  navbar:
    - title: Status
      href: /
    - title: QuNeva WFM
      href: https://www.quneva.com
    - title: Support
      href: mailto:support@quneva.com

assignees:
  - Abdelrahman-Ezzat-G

commitMessages:
  commitAuthorName: QuNeva Status Bot
  commitAuthorEmail: status-bot@quneva.com
  userUpdatedTemplate: "$SITE_NAME is $STATUS"
  statusChangeTemplate: "[$SITE_NAME] $OLD_STATUS → $STATUS"

i18n:
  langCode: en

# Check every 5 minutes
schedule: "*/5 * * * *"
